name: Monitor OpenAPI Contract Drift

on:
  push:
    branches: [ main, develop ]
    paths:
      - "AIUsageTracker.Monitor/**"
      - "scripts/verify-monitor-openapi-contract.ps1"
      - ".github/workflows/monitor-openapi-contract.yml"
      - ".github/actions/setup-dotnet-cache/**"
  pull_request:
    branches: [ main, develop ]
    paths:
      - "AIUsageTracker.Monitor/**"
      - "scripts/verify-monitor-openapi-contract.ps1"
      - ".github/workflows/monitor-openapi-contract.yml"
      - ".github/actions/setup-dotnet-cache/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-openapi-contract:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET with Cache
        uses: ./.github/actions/setup-dotnet-cache
        with:
          dotnet-version: "8.0.x"
          cache-key-prefix: "monitor-contract"

      - name: Restore Monitor dependencies
        run: dotnet restore AIUsageTracker.Monitor\AIUsageTracker.Monitor.csproj

      - name: Build Monitor
        run: dotnet build AIUsageTracker.Monitor\AIUsageTracker.Monitor.csproj --configuration Debug --no-restore

      - name: Verify Monitor OpenAPI contract drift
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify-monitor-openapi-contract.ps1
        shell: pwsh
