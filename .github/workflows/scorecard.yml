name: OSSF Scorecard

# Scorecard assesses supply-chain security posture (branch protection, pinned
# actions, SAST, code reviews, etc.) and publishes the results publicly to
# https://securityscorecards.dev so users can evaluate the project's practices.
#
# Runs on every push to main (so the public score stays current) and weekly
# for scheduled re-evaluation against newly published checks.

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '30 1 * * 1'  # Weekly on Monday at 1:30 AM
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Required by scorecard-action for OIDC token issuance and SARIF upload.
permissions:
  contents: read
  security-events: write
  id-token: write
  actions: read

jobs:
  analyze:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          # Publishes results to https://securityscorecards.dev (public repo only).
          publish_results: true

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc  # v4.34.1
        with:
          sarif_file: scorecard.sarif
          category: scorecard

      - name: Upload results artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: scorecard-results
          path: scorecard.sarif
          retention-days: 7
