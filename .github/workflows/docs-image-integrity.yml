name: Docs Image Integrity

on:
  push:
    branches: [ main, develop ]
    paths:
      - "README.md"
      - "docs/**"
      - "**/*.md"
      - "scripts/verify-doc-images.ps1"
      - ".github/workflows/docs-image-integrity.yml"
  pull_request:
    branches: [ main, develop ]
    paths:
      - "README.md"
      - "docs/**"
      - "**/*.md"
      - "scripts/verify-doc-images.ps1"
      - ".github/workflows/docs-image-integrity.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-doc-images:
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Verify README/docs image references
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify-doc-images.ps1
        shell: pwsh
