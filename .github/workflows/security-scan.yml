name: Security Scan

on:
  schedule:
    - cron: "0 6 * * 1"  # Weekly on Monday at 6 AM
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security-scan:
    name: Security Audit
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Setup .NET with cache
        uses: ./.github/actions/setup-dotnet-cache

      - name: Check for vulnerable packages
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee security-report.txt
          if grep -q "has the following vulnerable packages" security-report.txt; then
            echo "::error::Vulnerable packages found! See security-report.txt for details."
            exit 1
          fi
        shell: bash

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: security-scan-report
          path: security-report.txt
          retention-days: 30

