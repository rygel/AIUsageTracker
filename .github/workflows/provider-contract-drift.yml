name: Provider Contract Drift

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
  pull_request:
    branches: [ main, develop ]
    paths:
      - "AIUsageTracker.Infrastructure/Providers/**"
      - "AIUsageTracker.Tests/Infrastructure/Providers/**"
      - "AIUsageTracker.Tests/TestData/Providers/**"
      - ".github/workflows/provider-contract-drift.yml"
      - ".github/actions/setup-dotnet-cache/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  provider-contract-tests:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Setup .NET with Cache
        uses: ./.github/actions/setup-dotnet-cache
        with:
          dotnet-version: "8.0.x"
          cache-key-prefix: "provider-contract"

      - name: Restore dependencies
        run: dotnet restore AIUsageTracker.Tests\AIUsageTracker.Tests.csproj

      - name: Run provider contract tests
        run: >
          dotnet test AIUsageTracker.Tests\AIUsageTracker.Tests.csproj
          --configuration Debug
          --no-restore
          --filter "FullyQualifiedName~Infrastructure.Providers"
          --verbosity normal
          --logger "trx;LogFileName=provider-contract-drift.trx"

      - name: Upload provider fixture test results
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: provider-contract-drift-results
          path: AIUsageTracker.Tests\TestResults\**\provider-contract-drift.trx
