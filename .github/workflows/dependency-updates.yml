name: Dependency Updates

on:
  schedule:
    - cron: "0 2 * * 1"  # Weekly on Monday at 2 AM
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    name: Check and Update Dependencies
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Setup .NET with cache
        uses: ./.github/actions/setup-dotnet-cache

      - name: Check for outdated packages
        id: outdated
        run: |
          dotnet list package --outdated --format json > outdated.json 2>&1 || true
          
          # Check if there are outdated packages
          if grep -q "up-to-date" outdated.json; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "No outdated packages found"
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "Outdated packages found"
            cat outdated.json
          fi
        shell: bash

      - name: Update packages
        if: steps.outdated.outputs.has_updates == 'true'
        run: |
          # Update all packages to latest versions
          dotnet list package --outdated | grep -E '^\s+>' | while read -r line; do
            package=$(echo "$line" | awk '{print $2}')
            if [ -n "$package" ]; then
              echo "Updating $package..."
              dotnet add package "$package" || echo "Failed to update $package"
            fi
          done || true
        shell: bash

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
            git diff --stat
          fi
        shell: bash

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update NuGet packages"
          title: "chore(deps): weekly dependency updates"
          body: |
            ## Automated Dependency Updates
            
            This PR contains automated updates to NuGet packages.
            
            ### Changes
            - Updated packages to their latest versions
            - All updates are minor or patch versions
            
            ### Testing
            - [ ] Build passes
            - [ ] Tests pass
            - [ ] Security scan passes
            
            ### Notes
            - This PR was automatically generated by the dependency update workflow
            - Review package changelogs before merging
            - Major version updates should be reviewed carefully
          branch: chore/dependency-updates
          delete-branch: true
          labels: dependencies, automated

      - name: Summary
        env:
          HAS_CHANGES: ${{ steps.changes.outputs.has_changes }}
        run: |
          if [ "$HAS_CHANGES" = "true" ]; then
            echo "✅ Pull request created with dependency updates"
          else
            echo "✅ All dependencies are up to date"
          fi
        shell: bash
