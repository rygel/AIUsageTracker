name: Workflow Security & Lint

on:
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  pull_request:
    branches: [main, develop]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Install and run actionlint
        shell: bash
        run: |
          VERSION="1.7.4"
          FILENAME="actionlint_${VERSION}_linux_amd64.tar.gz"
          CHECKSUMS="actionlint_${VERSION}_checksums.txt"
          RELEASE="https://github.com/rhysd/actionlint/releases/download/v${VERSION}"
          curl -fsSL -o "${FILENAME}" "${RELEASE}/${FILENAME}"
          curl -fsSL -o "${CHECKSUMS}" "${RELEASE}/${CHECKSUMS}"
          grep "${FILENAME}" "${CHECKSUMS}" | sha256sum --check
          tar xzf "${FILENAME}" actionlint
          ./actionlint -color -config-file .actionlint.yaml -ignore 'SC[0-9]+:(info|style):'

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Install zizmor
        run: pip install zizmor==1.5.0

      - name: Run zizmor
        run: zizmor --format sarif .github/workflows/ > zizmor.sarif
        continue-on-error: true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463  # v4.36.1
        with:
          sarif_file: zizmor.sarif
          category: zizmor
