name: Analyzer Quality Gate

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - "Directory.Build.props"
      - ".editorconfig"
      - "AIUsageTracker.*/**"
      - "scripts/**"
      - ".github/workflows/analyzer-quality-gate.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyzer-gate:
    name: Analyzer Regression Check
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET with Cache
        uses: ./.github/actions/setup-dotnet-cache
        with:
          dotnet-version: "8.0.x"
          cache-key-prefix: "analyzer-gate"

      - name: Run Analyzer Regression Gate
        shell: pwsh
        env:
          BASE_REF: origin/${{ github.base_ref || 'develop' }}
        run: |
          .\scripts\analyzer-regression-gate.ps1 -BaseRef "$env:BASE_REF" -Solution AIUsageTracker.sln -Configuration Debug -ScopeConfig ".analyzer-gate/scope.json"

      - name: Upload analyzer gate artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: analyzer-gate-results
          path: |
            .analyzer-gate-output/new-analyzer-warnings.txt
            .analyzer-gate-output/analyzer-regression-summary.md
          if-no-files-found: ignore
          retention-days: 7
