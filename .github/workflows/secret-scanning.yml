name: Secret Scanning

# Gitleaks scans the git log for accidentally committed secrets (API keys,
# tokens, passwords). Runs on every PR and push to catch secrets before or
# immediately after they enter the main branches.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Fetch full history so gitleaks can scan all commits, not just HEAD.
          fetch-depth: 0
          persist-credentials: false

      - name: Install Gitleaks
        shell: bash
        run: |
          VERSION="8.21.2"
          FILENAME="gitleaks_${VERSION}_linux_x64.tar.gz"
          CHECKSUMS="gitleaks_${VERSION}_checksums.txt"
          RELEASE="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}"
          curl -fsSL -o "${FILENAME}" "${RELEASE}/${FILENAME}"
          curl -fsSL -o "${CHECKSUMS}" "${RELEASE}/${CHECKSUMS}"
          grep "${FILENAME}" "${CHECKSUMS}" | sha256sum --check
          tar xzf "${FILENAME}" gitleaks
          chmod +x gitleaks

      - name: Run Gitleaks (PR — scan new commits only)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          ./gitleaks detect \
            --source . \
            --log-opts "$BASE_SHA..$HEAD_SHA" \
            --redact \
            --exit-code 1

      - name: Run Gitleaks (push — scan with baseline)
        if: github.event_name != 'pull_request'
        run: |
          ./gitleaks detect \
            --source . \
            --baseline-path .gitleaksbaseline.json \
            --exit-code 1
