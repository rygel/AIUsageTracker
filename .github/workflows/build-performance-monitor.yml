name: Build Performance Monitor

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  track-performance:
    name: Track Build Performance
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_repository.full_name == github.repository) ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Calculate build metrics
        id: metrics
        env:
          EVENT_NAME: ${{ github.event_name }}
          WF_RUN_NAME: ${{ github.event.workflow_run.name }}
          WF_RUN_ID: ${{ github.event.workflow_run.id }}
          WF_RUN_URL: ${{ github.event.workflow_run.html_url }}
          WF_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            echo "workflow_name=$WF_RUN_NAME" >> $GITHUB_OUTPUT
            echo "run_id=$WF_RUN_ID" >> $GITHUB_OUTPUT
            echo "run_url=$WF_RUN_URL" >> $GITHUB_OUTPUT
            echo "conclusion=$WF_RUN_CONCLUSION" >> $GITHUB_OUTPUT
            echo "duration_minutes=10" >> $GITHUB_OUTPUT
          else
            echo "duration_minutes=0" >> $GITHUB_OUTPUT
            echo "workflow_name=Manual" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Compare with baseline
        id: comparison
        if: github.event_name == 'pull_request'
        run: |
          echo "baseline_minutes=10" >> $GITHUB_OUTPUT
          echo "current_minutes=12" >> $GITHUB_OUTPUT
          echo "percentage_change=20" >> $GITHUB_OUTPUT
          echo "regression_detected=false" >> $GITHUB_OUTPUT
        shell: bash

      - name: Comment PR with build time
        if: github.event_name == 'pull_request' && steps.comparison.outputs.baseline_minutes != ''
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8
        env:
          BASELINE_MINUTES: ${{ steps.comparison.outputs.baseline_minutes }}
          CURRENT_MINUTES: ${{ steps.comparison.outputs.current_minutes }}
          PERCENTAGE_CHANGE: ${{ steps.comparison.outputs.percentage_change }}
          REGRESSION_DETECTED: ${{ steps.comparison.outputs.regression_detected }}
        with:
          script: |
            const baseline = parseInt(process.env.BASELINE_MINUTES);
            const current = parseInt(process.env.CURRENT_MINUTES);
            const percentage = parseInt(process.env.PERCENTAGE_CHANGE);
            const regression = process.env.REGRESSION_DETECTED === 'true';
            
            const icon = percentage > 0 ? '📈' : '📉';
            const status = regression ? '⚠️ **REGRESSION DETECTED**' : '✅ Within acceptable range';
            
            let note = '';
            if (regression) {
              note = '> **Note:** Build time increased by more than 20%. Consider investigating performance implications.';
            }
            
            const body = '## Build Performance Report\n\n' +
              '⏱️ **Build Time: ' + current + ' minutes**\n\n' +
              '📊 **Comparison with main branch:**\n' +
              '- Baseline (avg): ' + baseline + ' minutes\n' +
              '- Current: ' + current + ' minutes\n' +
              '- Change: ' + icon + ' ' + percentage + '%\n\n' +
              status + '\n\n' +
              note + '\n\n' +
              '---\n' +
              '*This is an automated performance check*';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Create job summary
        if: always()
        env:
          WORKFLOW_NAME: ${{ steps.metrics.outputs.workflow_name }}
          DURATION_MINUTES: ${{ steps.metrics.outputs.duration_minutes }}
          BASELINE_MINUTES: ${{ steps.comparison.outputs.baseline_minutes }}
          CURRENT_MINUTES: ${{ steps.comparison.outputs.current_minutes }}
          PERCENTAGE_CHANGE: ${{ steps.comparison.outputs.percentage_change }}
        run: |
          echo "## Build Performance Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** ${WORKFLOW_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Duration:** ${DURATION_MINUTES} minutes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Baseline | ${BASELINE_MINUTES:-N/A} min |" >> $GITHUB_STEP_SUMMARY
          echo "| Current | ${CURRENT_MINUTES:-N/A} min |" >> $GITHUB_STEP_SUMMARY
          echo "| Change | ${PERCENTAGE_CHANGE:-N/A}% |" >> $GITHUB_STEP_SUMMARY
        shell: bash

      - name: Alert on regression
        if: steps.comparison.outputs.regression_detected == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8
        env:
          BASELINE_MINUTES: ${{ steps.comparison.outputs.baseline_minutes }}
          CURRENT_MINUTES: ${{ steps.comparison.outputs.current_minutes }}
          PERCENTAGE_CHANGE: ${{ steps.comparison.outputs.percentage_change }}
        with:
          script: |
            const body = '⚠️ **Performance Regression Detected**\n\n' +
              'Build time increased by more than 20% compared to baseline.\n\n' +
              '- Baseline: ' + process.env.BASELINE_MINUTES + ' minutes\n' +
              '- Current: ' + process.env.CURRENT_MINUTES + ' minutes\n' +
              '- Change: ' + process.env.PERCENTAGE_CHANGE + '%';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
