name: CodeQL

# CodeQL performs deep semantic analysis and requires a full build (~30 min).
# It runs weekly to catch newly published query findings against the existing
# codebase, not on every PR (too slow to be a useful gate).

on:
  push:
    branches: [ main, develop ]
    paths:
      - "AIUsageTracker.Core/**"
      - "AIUsageTracker.Infrastructure/**"
      - "AIUsageTracker.Monitor/**"
      - "AIUsageTracker.Web/**"
      - "AIUsageTracker.UI.Slim/**"
      - "AIUsageTracker.CLI/**"
  schedule:
    - cron: "0 7 * * 1"  # Weekly on Monday at 7 AM
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analysis (C#)
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Setup .NET with Cache
        uses: ./.github/actions/setup-dotnet-cache
        with:
          dotnet-version: "8.0.x"
          cache-key-prefix: "codeql"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c6f931105cb2c34c8f901cc885ba1e2e259cf745  # v4.34.0
        with:
          languages: csharp
          queries: security-and-quality

      - name: Build solution
        run: dotnet build AIUsageTracker.sln --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c6f931105cb2c34c8f901cc885ba1e2e259cf745  # v4.34.0
        with:
          category: codeql-csharp
