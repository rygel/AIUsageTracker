name: Semgrep

# Semgrep is fast and pattern-based — a good PR gate for catching new
# C# mistakes, OWASP Top 10 patterns, and hardcoded secrets as they enter.
# Daily schedule picks up newly published rules against the full codebase.

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - "**/*.cs"
      - ".github/workflows/semgrep.yml"
  schedule:
    - cron: "0 6 * * *"  # Daily at 6 AM
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: semgrep scan --config p/csharp --config p/secrets --config p/owasp-top-ten --sarif --output=semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        with:
          sarif_file: semgrep.sarif
          category: semgrep
