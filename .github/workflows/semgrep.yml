name: Semgrep

# Semgrep is fast and pattern-based — a good PR gate for catching new
# C# mistakes, OWASP Top 10 patterns, and hardcoded secrets as they enter.
# Daily schedule picks up newly published rules against the full codebase.

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - "**/*.cs"
      - ".github/workflows/semgrep.yml"
  schedule:
    - cron: "0 6 * * *"  # Daily at 6 AM
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Run Semgrep
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d  # v1
        with:
          config: >-
            p/csharp
            p/secrets
            p/owasp-top-ten
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: semgrep.sarif
          category: semgrep
