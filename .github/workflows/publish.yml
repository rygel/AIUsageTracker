name: Publish & Distribute

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'           # Stable releases: v2.2.25
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.*'    # Beta releases: v2.3.0-beta.1

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      matrix:
        runtime: [win-x64, win-x86, win-arm64, linux-x64, osx-x64, osx-arm64]
    
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Extract Version and Channel
        id: extract
        run: |
          $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
          $channel = if ($version -match '-beta') { 'beta' } else { 'stable' }
          
          echo "VERSION=$version" >> $env:GITHUB_ENV
          echo "CHANNEL=$channel" >> $env:GITHUB_ENV
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "channel=$channel" >> $env:GITHUB_OUTPUT
          
          Write-Host "Version: $version"
          Write-Host "Channel: $channel"
        shell: pwsh

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Inno Setup
        if: startsWith(matrix.runtime, 'win-')
        run: choco install innosetup
        shell: pwsh

      - name: Build and Package
        run: .\scripts\publish-app.ps1 -Runtime ${{ matrix.runtime }} -Version ${{ env.VERSION }}
        shell: pwsh

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: AIUsageTracker-v${{ env.VERSION }}-${{ matrix.runtime }}
          path: |
            dist/AIUsageTracker_v*_${{ matrix.runtime }}.zip
            dist/AIUsageTracker_Setup_v*_${{ matrix.runtime }}.exe
          retention-days: 7

  generate-appcast:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Extract Version and Channel
        id: extract
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [[ "$VERSION" =~ -beta ]]; then
            CHANNEL="beta"
          else
            CHANNEL="stable"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Channel: $CHANNEL"

      - name: Generate Appcast Files
        env:
          VERSION: ${{ steps.extract.outputs.version }}
          CHANNEL: ${{ steps.extract.outputs.channel }}
        run: |
          bash scripts/generate-appcast.sh "$VERSION" "$CHANNEL"

      - name: Upload Appcast Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: appcast-files-${{ steps.extract.outputs.channel }}
          path: appcast/*.xml
          retention-days: 7

  create-release:
    needs: [publish, generate-appcast]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Extract Version and Channel
        id: extract
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [[ "$VERSION" =~ -beta ]]; then
            CHANNEL="beta"
            PRERELEASE="true"
          else
            CHANNEL="stable"
            PRERELEASE="false"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

      - name: Download Build Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: artifacts
          pattern: AIUsageTracker-v${{ steps.extract.outputs.version }}-win-*
          merge-multiple: true

      - name: Download Appcast Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: appcast-files-${{ steps.extract.outputs.channel }}
          path: appcast

      - name: Verify Release Artifacts
        shell: pwsh
        env:
          VERSION: ${{ steps.extract.outputs.version }}
          CHANNEL: ${{ steps.extract.outputs.channel }}
        run: |
          ./scripts/verify-release-artifacts.ps1 `
            -Version "$env:VERSION" `
            -Channel "$env:CHANNEL" `
            -ArtifactsDir "artifacts" `
            -AppcastDir "appcast"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2
        with:
          files: |
            artifacts/**/*
            appcast/*.xml
          draft: false
          prerelease: ${{ steps.extract.outputs.prerelease == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Submit to Winget (Stable Only)
        if: steps.extract.outputs.channel == 'stable' && steps.extract.outputs.prerelease == 'false'
        uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e  # v2
        with:
          identifier: AIConsumption.Tracker
          installers-regex: '_win-x64\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}

