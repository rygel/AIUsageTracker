name: Publish & Distribute

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'           # Stable releases: v2.2.25
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.*'    # Beta releases: v2.3.0-beta.1
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v2.3.4-beta.33)'
        required: true
        type: string

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      matrix:
        runtime: [win-x64, win-x86, win-arm64, linux-x64, osx-x64, osx-arm64]
    
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Extract Version and Channel
        id: extract
        env:
          INPUT_TAG: ${{ inputs.tag || '' }}
        run: |
          $ref = if ($env:INPUT_TAG) { $env:INPUT_TAG } else { $env:GITHUB_REF }
          $version = $ref -replace 'refs/tags/v', '' -replace '^v', ''
          $channel = if ($version -match '-beta') { 'beta' } else { 'stable' }
          
          echo "VERSION=$version" >> $env:GITHUB_ENV
          echo "CHANNEL=$channel" >> $env:GITHUB_ENV
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "channel=$channel" >> $env:GITHUB_OUTPUT
          
          Write-Host "Version: $version"
          Write-Host "Channel: $channel"
        shell: pwsh

      - name: Setup .NET with Cache
        uses: ./.github/actions/setup-dotnet-cache
        with:
          dotnet-version: '10.0.x'
          cache-key-prefix: 'publish'

      - name: Install Inno Setup
        if: startsWith(matrix.runtime, 'win-')
        run: choco install innosetup
        shell: pwsh

      - name: Build and Package
        run: .\scripts\publish-app.ps1 -Runtime ${{ matrix.runtime }} -Version ${{ env.VERSION }}
        shell: pwsh

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: AIUsageTracker-v${{ env.VERSION }}-${{ matrix.runtime }}
          path: |
            dist/AIUsageTracker_v*_${{ matrix.runtime }}.zip
            dist/AIUsageTracker_Setup_v*_${{ matrix.runtime }}.exe
          retention-days: 7

  generate-appcast:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Extract Version and Channel
        id: extract
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [[ "$VERSION" =~ -beta ]]; then
            CHANNEL="beta"
          else
            CHANNEL="stable"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Channel: $CHANNEL"

      - name: Download Win Installers (for file sizes)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: installers
          pattern: AIUsageTracker-v${{ steps.extract.outputs.version }}-win-*
          merge-multiple: true

      - name: Generate Appcast Files
        env:
          VERSION: ${{ steps.extract.outputs.version }}
          CHANNEL: ${{ steps.extract.outputs.channel }}
        run: |
          INSTALLER_SIZE_X64=$(stat -c%s installers/AIUsageTracker_Setup_v${VERSION}_win-x64.exe 2>/dev/null || echo "0")
          INSTALLER_SIZE_X86=$(stat -c%s installers/AIUsageTracker_Setup_v${VERSION}_win-x86.exe 2>/dev/null || echo "0")
          INSTALLER_SIZE_ARM64=$(stat -c%s installers/AIUsageTracker_Setup_v${VERSION}_win-arm64.exe 2>/dev/null || echo "0")
          echo "Installer sizes: x64=${INSTALLER_SIZE_X64} x86=${INSTALLER_SIZE_X86} arm64=${INSTALLER_SIZE_ARM64}"
          INSTALLER_SIZE_X64="$INSTALLER_SIZE_X64" \
          INSTALLER_SIZE_X86="$INSTALLER_SIZE_X86" \
          INSTALLER_SIZE_ARM64="$INSTALLER_SIZE_ARM64" \
          bash scripts/generate-appcast.sh "$VERSION" "$CHANNEL"

      - name: Upload Appcast Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: appcast-files-${{ steps.extract.outputs.channel }}
          path: appcast/*.xml
          retention-days: 7

  create-release:
    needs: [publish, generate-appcast]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Extract Version and Channel
        id: extract
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [[ "$VERSION" =~ -beta ]]; then
            CHANNEL="beta"
            PRERELEASE="true"
          else
            CHANNEL="stable"
            PRERELEASE="false"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT

      - name: Download Build Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: artifacts
          pattern: AIUsageTracker-v${{ steps.extract.outputs.version }}-win-*
          merge-multiple: true

      - name: Download Appcast Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: appcast-files-${{ steps.extract.outputs.channel }}
          path: appcast

      - name: Verify Release Artifacts
        shell: pwsh
        env:
          VERSION: ${{ steps.extract.outputs.version }}
          CHANNEL: ${{ steps.extract.outputs.channel }}
        run: |
          ./scripts/verify-release-artifacts.ps1 `
            -Version "$env:VERSION" `
            -Channel "$env:CHANNEL" `
            -ArtifactsDir "artifacts" `
            -AppcastDir "appcast"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v2
        with:
          files: |
            artifacts/**/*
            appcast/*.xml
          draft: false
          prerelease: ${{ steps.extract.outputs.prerelease == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Submit to Winget (Stable Only)
        if: steps.extract.outputs.channel == 'stable' && steps.extract.outputs.prerelease == 'false'
        uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e  # v2
        with:
          identifier: AIConsumption.Tracker
          installers-regex: '_win-x64\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}

