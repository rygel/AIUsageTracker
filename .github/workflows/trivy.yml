name: Trivy

# Split by concern:
#   pull_request — secrets scan only (fast, blocks secrets entering the codebase)
#   schedule     — full scan including vulnerabilities (Dependabot handles routine
#                  NuGet updates; weekly Trivy catches new CVEs in existing deps
#                  and refreshes the secret-pattern DB)

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - "**/*.cs"
      - "**/*.csproj"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.yaml"
      - ".github/workflows/trivy.yml"
  schedule:
    - cron: "0 6 * * 5"  # Friday at 6 AM
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Run Trivy (secrets on PRs; secrets + vulns on schedule)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.35.0  # v0.29.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: ${{ github.event_name == 'pull_request' && 'secret' || 'secret,vuln' }}
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: trivy.sarif

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: trivy.sarif
          category: trivy
