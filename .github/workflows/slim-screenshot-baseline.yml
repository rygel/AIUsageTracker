name: Slim Screenshot Baseline

# Behaviour split by event type:
#   push / workflow_dispatch → generate fresh screenshots on windows-2025 and commit
#            updated baselines directly to the branch with [skip ci].
#   pull_request → compare freshly-generated screenshots against the committed baselines
#            and fail on regressions > 1% pixel error.  This is the regression gate.

on:
  push:
    branches: [ main, develop ]
    paths:
      - "AIUsageTracker.UI.Slim/**"
      - "AIUsageTracker.Tests/UI/ScreenshotBaselineTests.cs"
      - "scripts/capture_screenshot.ps1"
      - "scripts/generate_screenshots.ps1"
      - "scripts/verify_slim_theme_smoke.ps1"
      - "docs/screenshot_*_privacy.png"
      - ".github/workflows/slim-screenshot-baseline.yml"
      - ".github/actions/setup-dotnet-cache/**"
  pull_request:
    branches: [ main, develop ]
    paths:
      - "AIUsageTracker.UI.Slim/**"
      - "AIUsageTracker.Tests/UI/ScreenshotBaselineTests.cs"
      - "scripts/capture_screenshot.ps1"
      - "scripts/generate_screenshots.ps1"
      - "scripts/verify_slim_theme_smoke.ps1"
      - "docs/screenshot_*_privacy.png"
      - ".github/workflows/slim-screenshot-baseline.yml"
      - ".github/actions/setup-dotnet-cache/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  screenshot-baseline:
    runs-on: windows-2025
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        # zizmor: ignore[artipacked] — credentials required to push the baseline-update branch
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup .NET with Cache
        uses: ./.github/actions/setup-dotnet-cache
        with:
          dotnet-version: "8.0.x"
          cache-key-prefix: "slim-screenshot"

      - name: Restore Slim UI dependencies
        run: dotnet restore AIUsageTracker.UI.Slim\AIUsageTracker.UI.Slim.csproj

      - name: Build Slim UI
        run: dotnet build AIUsageTracker.UI.Slim\AIUsageTracker.UI.Slim.csproj --configuration Debug --no-restore

      - name: Restore test dependencies
        run: dotnet restore AIUsageTracker.Tests\AIUsageTracker.Tests.csproj

      - name: Build tests
        run: dotnet build AIUsageTracker.Tests\AIUsageTracker.Tests.csproj --configuration Debug --no-restore

      - name: Verify Slim themes render in headless mode
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify_slim_theme_smoke.ps1 -Configuration Debug -SkipBuild
        shell: pwsh

      # ── Push / dispatch path: auto-commit updated baselines ──────────────

      - name: Generate fresh screenshots
        if: github.event_name != 'pull_request'
        run: >
          powershell -NoProfile -ExecutionPolicy Bypass
          -File .\scripts\capture_screenshot.ps1
          -Configuration Debug -SkipBuild
        shell: pwsh

      - name: Auto-commit updated baselines directly to branch
        if: github.event_name != 'pull_request'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/screenshot_*_privacy.png
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Baselines unchanged — nothing to commit."
            exit 0
          }
          $count = (git diff --cached --name-only | Measure-Object -Line).Lines
          git commit -m "chore: update $count screenshot baseline(s) from CI (windows-2025) [skip ci]"
          git push || Write-Host "##[warning]Could not push baselines (branch protection). Download the artifact to update manually."
        shell: pwsh

      - name: Upload updated baselines as artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: slim-ui-screenshot-baselines
          path: docs/screenshot_*_privacy.png
          if-no-files-found: ignore

      # ── Pull-request path: compare candidate screenshots against committed baselines ──

      - name: Copy baseline screenshots
        if: github.event_name == 'pull_request'
        run: |
          $baselineDir = "$env:RUNNER_TEMP\screenshot-baseline"
          New-Item -ItemType Directory -Force -Path $baselineDir | Out-Null
          Copy-Item docs\screenshot_*_privacy.png $baselineDir
          Write-Host "Baselines copied to $baselineDir"
        shell: pwsh

      - name: Generate fresh screenshots (to candidate dir)
        if: github.event_name == 'pull_request'
        run: |
          $candidateDir = "$env:RUNNER_TEMP\screenshot-candidate"
          New-Item -ItemType Directory -Force -Path $candidateDir | Out-Null
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\capture_screenshot.ps1 `
            -Configuration Debug -SkipBuild -OutputDir $candidateDir
        shell: pwsh

      - name: Compare screenshots against baseline (perceptual, 1% tolerance)
        if: github.event_name == 'pull_request'
        env:
          SCREENSHOT_BASELINE_DIR: ${{ runner.temp }}\screenshot-baseline
          SCREENSHOT_CANDIDATE_DIR: ${{ runner.temp }}\screenshot-candidate
        run: >
          dotnet test AIUsageTracker.Tests\AIUsageTracker.Tests.csproj
          --no-build --configuration Debug
          --filter "Category=Screenshot"
          --logger "console;verbosity=normal"

      - name: Upload screenshots and diffs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: slim-ui-screenshot-diff
          path: |
            ${{ runner.temp }}/screenshot-baseline/*.png
            ${{ runner.temp }}/screenshot-candidate/*.png
